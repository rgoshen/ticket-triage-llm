name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PY_VERSION"

      - name: Install dependencies
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv sync --all-extras --python "$PY_VERSION"

      - name: Lint
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv run --python "$PY_VERSION" ruff check .

      - name: Format check
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv run --python "$PY_VERSION" ruff format --check .

      - name: Test with coverage
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv run --python "$PY_VERSION" pytest --cov=ticket_triage_llm --cov-fail-under=80
